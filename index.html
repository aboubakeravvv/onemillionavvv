<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Wants To Be A Millionaire | من سيربح المليون</title>
  <link rel="icon" type="image/png" href="logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Montserrat:wght@700;900&display=swap');

  :root{
    --bg:#040404;
    --stage:#0d0505;
    --red:#e21f2f;
    --red-dim:#6e0e16;
    --red-glow:#ff5262;
    --red-deep:#3a0a10;
    --silver:#d7d2c9;
    --text:#f5efe9;
    --muted:#a89b96;
    /* legacy aliases so existing rules still resolve */
    --gold:var(--red);
    --gold-dim:var(--red-dim);
    --blue:var(--red-dim);
    --blue-glow:var(--red-glow);
    --green:#2fae66;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#000;
    color:var(--text);
    font-family:'Cairo', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  .bg-anim{position:fixed; inset:0; z-index:0; overflow:hidden; background:#000;}
  .blob{position:absolute; border-radius:50%; filter:blur(110px); opacity:.3; animation:floatBlob 20s ease-in-out infinite;}
  .blob1{width:520px; height:520px; background:#c8102e; top:-12%; left:-10%; animation-delay:0s;}
  .blob2{width:480px; height:480px; background:#7a0f1c; bottom:-16%; right:-8%; animation-delay:-7s;}
  .blob3{width:420px; height:420px; background:#e21f2f; top:35%; left:55%; animation-delay:-13s;}
  @keyframes floatBlob{
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(50px,-40px) scale(1.12);}
    66%{transform:translate(-40px,50px) scale(0.92);}
  }
  .beams{position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.4;}
  .beam{position:absolute; top:-20%; width:2px; height:140%; background:linear-gradient(to bottom, rgba(226,31,47,0.35), transparent 70%); transform-origin:top center; animation:beamPulse 6s ease-in-out infinite;}
  @keyframes beamPulse{0%,100%{opacity:.25;} 50%{opacity:.7;}}

  .screen{display:none; position:relative; z-index:1; min-height:100vh;}
  .screen.active{display:flex; flex-direction:column;}

  /* ================= HOME SCREEN ================= */
  #screen-home{align-items:center; justify-content:center; text-align:center; padding:40px 20px;}
  .home-inner{max-width:600px; display:flex; flex-direction:column; align-items:center; gap:26px;}
  .eyebrow{
    letter-spacing:6px; font-size:12px; color:var(--muted); font-weight:700;
    text-transform:uppercase; font-family:'Montserrat',sans-serif;
  }
  .home-title-ar{
    font-size:clamp(34px,7vw,58px); font-weight:800;
    background:linear-gradient(180deg,#fff 0%, var(--red-glow) 55%, var(--red-dim) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 50px rgba(226,31,47,0.35); margin:0; line-height:1.15;
  }
  .home-title-en{
    font-family:'Montserrat',sans-serif; font-weight:900; letter-spacing:2px;
    font-size:clamp(14px,2.6vw,20px); color:var(--red-glow); margin:0;
  }
  .home-desc{color:var(--muted); font-size:15px; line-height:1.8; max-width:440px;}

  .ring-deco{position:relative; width:180px; height:180px; display:flex; align-items:center; justify-content:center;}
  .ring{position:absolute; border-radius:50%; border:2px solid rgba(226,31,47,0.55); box-shadow:0 0 30px rgba(226,31,47,0.35), inset 0 0 20px rgba(226,31,47,0.25); animation:ringSpin 16s linear infinite;}
  .ring1{width:180px; height:180px; animation-duration:20s;}
  .ring2{width:140px; height:140px; animation-duration:14s; animation-direction:reverse; border-color:rgba(255,82,98,0.5);}
  .ring3{width:100px; height:100px; animation-duration:10s; border-color:rgba(226,31,47,0.7);}
  @keyframes ringSpin{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
  .emblem{position:relative; z-index:2; font-size:40px; display:flex; align-items:center; justify-content:center; filter:drop-shadow(0 0 18px rgba(226,31,47,0.7));}

  .btn-primary{
    background:linear-gradient(180deg, var(--red-glow), var(--red-dim));
    color:#fff; border:2px solid rgba(215,210,201,0.5); border-radius:999px;
    padding:15px 46px; font-weight:800; font-size:16px; font-family:'Montserrat','Cairo',sans-serif;
    letter-spacing:1px;
    cursor:pointer; box-shadow:0 10px 34px rgba(226,31,47,0.45), inset 0 0 12px rgba(255,255,255,0.15);
    transition:transform .15s;
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 14px 40px rgba(226,31,47,0.6), inset 0 0 12px rgba(255,255,255,0.2);}
  .btn-primary:disabled{opacity:.35; cursor:not-allowed; transform:none;}
  .btn-ghost{
    background:transparent; border:1.5px solid var(--muted); color:var(--muted);
    border-radius:999px; padding:12px 26px; font-weight:700; cursor:pointer; font-family:'Cairo',sans-serif;
  }
  .btn-ghost:hover{border-color:var(--text); color:var(--text);}

  /* ================= CATEGORY SCREEN ================= */
  #screen-categories{padding:36px 18px 60px; align-items:center;}
  .cat-header{text-align:center; margin-bottom:30px;}
  .cat-header h2{
    font-family:'Montserrat',sans-serif; font-weight:900; font-size:clamp(22px,4vw,32px);
    color:var(--gold); margin:0 0 6px;
  }
  .cat-header p{color:var(--muted); margin:0; font-size:14px;}
  .cat-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:22px 18px;
    max-width:620px; width:100%; margin:0 auto; justify-items:center;
  }
  @media (max-width:560px){ .cat-grid{grid-template-columns:repeat(2,1fr); max-width:420px;} }
  @media (max-width:340px){ .cat-grid{grid-template-columns:1fr; max-width:200px;} }

  .cat-item{display:flex; flex-direction:column; align-items:center; width:170px;}
  .cat-card{
    position:relative; width:170px; height:210px; border-radius:14px; overflow:hidden; cursor:pointer;
    background:linear-gradient(160deg, #1a0709, #050202);
    border:1px solid rgba(226,31,47,0.4);
    box-shadow:0 0 0 1px rgba(226,31,47,0.08) inset, 0 14px 34px rgba(0,0,0,0.55);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; padding-bottom:10px;
    transition:transform .18s, box-shadow .18s;
  }
  .cat-card:hover{transform:translateY(-6px) scale(1.03); box-shadow:0 0 0 1px rgba(226,31,47,0.3) inset, 0 18px 46px rgba(226,31,47,0.35);}

  .cat-label{
    margin-top:-16px; z-index:2;
    background:linear-gradient(180deg, var(--red-glow), var(--red-dim));
    border:1px solid rgba(215,210,201,0.4);
    border-radius:999px; padding:7px 18px; font-weight:800; font-size:13px; color:#fff;
    box-shadow:0 6px 18px rgba(226,31,47,0.45); white-space:nowrap;
  }
  .cat-pedestal{
    width:64px; height:14px; margin-top:10px; border-radius:50%;
    background:radial-gradient(ellipse, rgba(226,31,47,0.9), rgba(226,31,47,0));
    box-shadow:0 0 22px 6px rgba(226,31,47,0.5);
  }

  /* ================= GAME SCREEN ================= */
  #screen-game{padding:22px 16px 60px; align-items:center;}
  .game-wrap{max-width:1200px; width:100%; margin:0 auto;}
  .back-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .cat-pill{
    display:inline-flex; align-items:center; gap:8px; background:#170608; border:1px solid #4a0f16;
    padding:6px 16px; border-radius:999px; font-size:13px; font-weight:700; color:var(--gold);
  }
  .layout{display:grid; grid-template-columns:1fr 220px; gap:22px;}
  @media (max-width:760px){ .layout{grid-template-columns:1fr;} .ladder{order:2;} .game{order:1;} }

  .game{display:flex; flex-direction:column; gap:18px;}
  .status-row{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  .prize-current{font-weight:800; font-size:20px; color:var(--gold);}
  .lifelines{display:flex; gap:10px;}
  .life-btn{
    width:46px; height:46px; border-radius:50%; border:2px solid var(--gold-dim);
    background:radial-gradient(circle at 35% 30%, #23090c, #0a0303); color:var(--gold);
    font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .15s, box-shadow .15s, opacity .2s;
  }
  .life-btn:hover:not(:disabled){transform:translateY(-2px); box-shadow:0 0 16px rgba(232,185,63,0.45);}
  .life-btn:disabled{opacity:.25; cursor:not-allowed; text-decoration:line-through;}

  .timer-row{display:flex; align-items:center; gap:12px;}
  .timer-bar{flex:1; height:10px; background:#161c48; border-radius:999px; overflow:hidden; border:1px solid #4a0f16;}
  .timer-fill{height:100%; width:100%; background:var(--blue-glow); transition:width 1s linear, background .3s;}
  .timer-text{
    font-family:'Montserrat',sans-serif; font-weight:800; font-size:14px; color:var(--gold);
    min-width:28px; text-align:center;
  }

  .question-panel{
    background:linear-gradient(180deg, #170608, #0d0303); border:1px solid #4a0f16; border-radius:18px;
    padding:28px 26px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.5);
    min-height:110px; display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .q-text{font-size:clamp(17px,2.4vw,22px); font-weight:700; line-height:1.6;}

  .options{display:grid; grid-template-columns:1fr 1fr; gap:14px;}

  .opt{

    padding:14px 20px; color:var(--text); font-family:'Cairo', sans-serif; font-size:15px; font-weight:600;
    text-align:right; cursor:pointer; display:flex; gap:10px; align-items:center;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .opt .tag{color:var(--gold); font-weight:800; font-family:'Montserrat',sans-serif;}
  .opt:hover:not(.locked){border-color:var(--blue-glow); transform:translateY(-1px);}
  .opt.selected{background:linear-gradient(180deg, #223a86, #16255c); border-color:var(--blue-glow); animation:pulse 1s infinite;}
  .opt.correct{background:linear-gradient(180deg, #1c5c3c, #123d28); border-color:var(--green);}
  .opt.wrong{background:linear-gradient(180deg, #6e1c2a, #3f0f18); border-color:var(--red);}
  .opt.removed{opacity:0; pointer-events:none;}
  .opt.locked{cursor:default;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(226,31,47,0.5);}50%{box-shadow:0 0 22px rgba(226,31,47,0.6);}}

  .actions{display:flex; justify-content:center; gap:14px; margin-top:4px;}

  .aud-panel, .friend-panel{background:#0d0303; border:1px solid #4a0f16; border-radius:14px; padding:16px 18px; display:none; flex-direction:column; gap:8px;}
  .aud-panel.show, .friend-panel.show{display:flex;}
  .aud-bar-row{display:flex; align-items:center; gap:10px; font-size:13px;}
  .aud-bar-track{flex:1; background:#2a0a0e; border-radius:6px; overflow:hidden; height:14px;}
  .aud-bar-fill{height:100%; background:linear-gradient(90deg, var(--blue), var(--blue-glow)); width:0%; transition:width .8s ease;}
  .friend-panel p{margin:0; font-size:14px; color:var(--muted); line-height:1.6;}
  .friend-panel b{color:var(--text);}

  .ladder{background:linear-gradient(180deg, #0d0303, #060202); border:1px solid #3a0f14; border-radius:16px; padding:14px 10px; display:flex; flex-direction:column-reverse; gap:4px; height:fit-content;}
  .rung{display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-radius:8px; font-size:13px; font-weight:700; color:var(--muted);}

  .rung.passed{color:var(--gold); opacity:.75;}

  .end-screen.show{display:flex;}

  .end-screen p{color:var(--muted); font-size:16px; max-width:480px;}
</style>

const CAT_META = {
  general:  {icon:"🌍", ar:"ثقافة عامة", en:"GENERAL", cls:"cat-general"},
  football: {icon:"⚽", ar:"كرة القدم",  en:"FOOTBALL",   cls:"cat-football"},
  religion: {icon:"🕌", ar:"الدين الإسلامي", en:"RELIGION", cls:"cat-religion"},
  movies:   {icon:"🎬", ar:"أفلام و مسلسلات", en:"MOVIES", cls:"cat-movies"},
  anime:    {icon:"⛩️", ar:"أنمي",        en:"ANIME",      cls:"cat-anime"},
  fun:      {icon:"🙂", ar:"أسئلة باسلين", en:"FUN & LIGHT", cls:"cat-fun"},
};

const LADDER_PRIZES = [1000,2000,5000,10000,20000,40000,80000,150000,300000,600000,1000000,2000000,4000000,8000000,15000000];

/* ============== STATE ============== */
const usedMap = {};      // category -> Set of used question indices (session-only, no repeats until pool exhausted)
const state = { category:null, questions:[], level:0, usedFifty:false, usedAudience:false, usedFriend:false, locked:false };
const TIMER_SECONDS = 25;
let timerInterval = null;
let timeLeft = TIMER_SECONDS;

/* ============== HELPERS ============== */
function fmt(n){ return n.toLocaleString('en-US'); }
function shuffleArr(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function pickQuestionsForCategory(cat){
  const pool = BANKS[cat];
  let used = usedMap[cat] || new Set();
  let available = pool.map((q,i)=>i).filter(i=>!used.has(i));
  if(available.length < 15){ used = new Set(); available = pool.map((q,i)=>i); }
  shuffleArr(available);
  const chosen = available.slice(0,15);
  chosen.forEach(i=>used.add(i));
  usedMap[cat] = used;
  // also shuffle the order of options within each picked question so answer position varies
  return chosen.map(i=>{
    const orig = pool[i];
    const order = shuffleArr([0,1,2,3]);
    const opts = order.map(k=>orig.opts[k]);
    const a = order.indexOf(orig.a);
    return {q:orig.q, opts, a};
  });
}

function renderBeams(){
  const beams = document.getElementById('beams');
  for(let i=0;i<7;i++){
    const b = document.createElement('div');
    b.className='beam';
    b.style.left = (10 + i*13) + '%';
    b.style.transform = `rotate(${(i-3)*4}deg)`;
    beams.appendChild(b);
  }
}
renderBeams();

/* ============== SCREEN NAV ============== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildCategoryGrid(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.entries(CAT_META).forEach(([key,meta],idx)=>{
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div class="cat-card ${meta.cls}"></div>
      <div class="cat-label">${meta.ar}</div>
      <div class="cat-pedestal"></div>
    `;
    item.querySelector('.cat-card').onclick = ()=> startGame(key);
    grid.appendChild(item);
  });
}
buildCategoryGrid();

document.getElementById('goToCategories').onclick = ()=> showScreen('screen-categories');
document.getElementById('backToCatBtn').onclick = ()=> showScreen('screen-categories');
document.getElementById('otherCatBtn').onclick = ()=> showScreen('screen-categories');

/* ============== LADDER ============== */
function buildLadder(){
  const ladder = document.getElementById('ladder');
  ladder.innerHTML = '';
  LADDER_PRIZES.forEach((prize,i)=>{
    const div = document.createElement('div');
    div.className = 'rung' + ((i===4||i===9)? ' milestone':'');
    div.id = 'rung-'+i;
    div.innerHTML = `<span>${fmt(prize)}</span><span class="n">${i+1}</span>`;
    ladder.appendChild(div);
  });
}
function updateLadderHighlight(){
  LADDER_PRIZES.forEach((p,i)=>{
    const el = document.getElementById('rung-'+i);
    el.classList.remove('current','passed');
    if(i < state.level) el.classList.add('passed');
    if(i === state.level) el.classList.add('current');
  });
}

/* ============== GAME LOGIC ============== */
const els = {
  currentPrize: document.getElementById('currentPrize'),
  qText: document.getElementById('qText'),
  optionsArea: document.getElementById('optionsArea'),
  walkBtn: document.getElementById('walkBtn'),
  btn5050: document.getElementById('btn5050'),
  btnAudience: document.getElementById('btnAudience'),
  btnFriend: document.getElementById('btnFriend'),
  audPanel: document.getElementById('audPanel'),
  friendPanel: document.getElementById('friendPanel'),
  friendText: document.getElementById('friendText'),
  endScreen: document.getElementById('endScreen'),
  endTitle: document.getElementById('endTitle'),
  endText: document.getElementById('endText'),
  restartBtn: document.getElementById('restartBtn'),
  catPill: document.getElementById('catPill'),
  statusRow: document.querySelector('#screen-game .status-row'),
  questionPanel: document.querySelector('#screen-game .question-panel'),
  timerRow: document.querySelector('#screen-game .timer-row'),
  timerFill: document.getElementById('timerFill'),
  timerText: document.getElementById('timerText'),
};

/* ---- Countdown Timer ---- */
function startTimer(){
  clearTimer();
  timeLeft = TIMER_SECONDS;
  updateTimerUI();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if(timeLeft <= 0){
      clearTimer();
      handleTimeUp();
    }
  }, 1000);
}
function clearTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
}
function updateTimerUI(){
  els.timerText.textContent = timeLeft;
  const pct = Math.max(0,(timeLeft/TIMER_SECONDS)*100);
  els.timerFill.style.width = pct + '%';
  els.timerFill.style.background = timeLeft <= 5 ? 'var(--red)' : (timeLeft <= 10 ? 'var(--gold)' : 'var(--blue-glow)');
}
function handleTimeUp(){
  if(state.locked) return;
  state.locked = true;
  const q = state.questions[state.level];
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
  const opts = document.querySelectorAll('.opt');
  opts[q.a].classList.add('correct');
  setTimeout(()=>{
    const guaranteed = state.level > 9 ? 1000000 : (state.level > 4 ? 20000 : 0);
    endGame(false, guaranteed, true);
  }, 1400);
}

function startGame(cat){
  state.category = cat;
  state.questions = pickQuestionsForCategory(cat);
  state.level = 0;
  state.usedFifty = false;
  state.usedAudience = false;
  state.usedFriend = false;
  state.locked = false;

  const meta = CAT_META[cat];
  els.catPill.textContent = meta.icon + ' ' + meta.ar;

  els.btn5050.disabled = false;
  els.btnAudience.disabled = false;
  els.btnFriend.disabled = false;
  els.audPanel.classList.remove('show');
  els.friendPanel.classList.remove('show');
  els.endScreen.classList.remove('show');
  els.statusRow.style.display = 'flex';
  els.timerRow.style.display = 'flex';
  els.questionPanel.style.display = 'flex';
  els.optionsArea.style.display = 'grid';
  els.walkBtn.style.display = 'inline-block';

  buildLadder();
  loadQuestion();
  showScreen('screen-game');
}

function loadQuestion(){
  state.locked = false;
  els.audPanel.classList.remove('show');
  els.friendPanel.classList.remove('show');
  const q = state.questions[state.level];
  els.qText.textContent = q.q;
  els.currentPrize.textContent = fmt(state.level===0 ? 0 : LADDER_PRIZES[state.level-1]);
  els.optionsArea.innerHTML = '';
  const tags = ['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.dataset.idx = i;
    b.innerHTML = `<span class="tag">${tags[i]}</span><span>${opt}</span>`;
    b.onclick = ()=> selectAnswer(i,b);
    els.optionsArea.appendChild(b);
  });
  updateLadderHighlight();
  startTimer();
}

function selectAnswer(i, btn){
  if(state.locked) return;
  state.locked = true;
  clearTimer();
  const q = state.questions[state.level];
  btn.classList.add('selected');
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
  setTimeout(()=>{
    const opts = document.querySelectorAll('.opt');
    if(i === q.a){
      opts[i].classList.remove('selected');
      opts[i].classList.add('correct');
      setTimeout(()=>{
        state.level++;
        if(state.level >= state.questions.length){
          endGame(true, LADDER_PRIZES[LADDER_PRIZES.length-1]);
        } else {
          loadQuestion();
        }
      }, 1100);
    } else {
      opts[i].classList.remove('selected');
      opts[i].classList.add('wrong');
      opts[q.a].classList.add('correct');
      setTimeout(()=>{
        const guaranteed = state.level > 9 ? 1000000 : (state.level > 4 ? 20000 : 0);
        endGame(false, guaranteed);
      }, 1400);
    }
  }, 900);
}

function hideGameBody(){
  clearTimer();
  els.statusRow.style.display = 'none';
  els.timerRow.style.display = 'none';
  els.questionPanel.style.display = 'none';
  els.optionsArea.style.display = 'none';
  els.audPanel.classList.remove('show');
  els.friendPanel.classList.remove('show');
  els.walkBtn.style.display = 'none';
}

function endGame(won, prize, timeUp){
  hideGameBody();
  els.endScreen.classList.add('show');
  if(won){
    els.endTitle.textContent = 'مبروك! لقد ربحت المليون! 🏆';
    els.endText.textContent = 'أجبت على جميع الأسئلة بنجاح وفزت بالجائزة الكبرى: ' + fmt(prize) + ' ل.س';
  } else if(timeUp){
    els.endTitle.textContent = 'انتهى الوقت! ⏱️';
    els.endText.textContent = 'ما جاوبتش قبل ما تخلص الـ 25 ثانية. تخرج بجائزة مضمونة قدرها: ' + fmt(prize) + ' ل.س';
  } else {
    els.endTitle.textContent = 'للأسف، إجابة خاطئة';
    els.endText.textContent = 'تنسحب بجائزة مضمونة قدرها: ' + fmt(prize) + ' ل.س';
  }
}

function walkAway(){
  if(state.locked) return;
  const prize = state.level===0 ? 0 : LADDER_PRIZES[state.level-1];
  hideGameBody();
  els.endScreen.classList.add('show');
  els.endTitle.textContent = 'انسحبت من اللعبة';
  els.endText.textContent = 'غادرت بجائزة قدرها: ' + fmt(prize) + ' ل.س. قرار حكيم أحياناً أفضل من المخاطرة!';
}

/* ---- Lifelines ---- */
els.btn5050.onclick = ()=>{
  if(state.usedFifty || state.locked) return;
  state.usedFifty = true;
  els.btn5050.disabled = true;
  const q = state.questions[state.level];
  const wrongIdx = [0,1,2,3].filter(i=>i!==q.a);
  const toRemove = shuffleArr(wrongIdx).slice(0,2);
  document.querySelectorAll('.opt').forEach(o=>{
    if(toRemove.includes(Number(o.dataset.idx))) o.classList.add('removed');
  });
};

els.btnAudience.onclick = ()=>{
  if(state.usedAudience || state.locked) return;
  state.usedAudience = true;
  els.btnAudience.disabled = true;
  els.friendPanel.classList.remove('show');
  const q = state.questions[state.level];
  const correctBoost = 40 + Math.random()*35;
  const remaining = 100 - correctBoost;
  const others = [0,1,2,3].filter(i=>i!==q.a);
  const otherVals = others.map(()=>Math.random());
  const otherSum = otherVals.reduce((a,b)=>a+b,0);
  const finalPercents = [0,0,0,0];
  finalPercents[q.a] = Math.round(correctBoost);
  others.forEach((idx,k)=>{ finalPercents[idx] = Math.round((otherVals[k]/otherSum) * remaining); });
  els.audPanel.innerHTML = ['A','B','C','D'].map((tag,i)=>`
    <div class="aud-bar-row">
      <span style="width:16px;">${tag}</span>
      <div class="aud-bar-track"><div class="aud-bar-fill" id="audbar${i}"></div></div>
      <span style="width:34px;">${finalPercents[i]}%</span>
    </div>`).join('');
  els.audPanel.classList.add('show');
  setTimeout(()=>{ finalPercents.forEach((p,i)=>{ document.getElementById('audbar'+i).style.width = p+'%'; }); }, 50);
};

const FRIEND_LINES = [
  "أنا لست متأكداً مئة بالمئة، لكن أعتقد أن الإجابة هي",
  "بحسب ما أتذكر، الجواب الصحيح غالباً هو",
  "لدي شعور قوي أن الإجابة الصحيحة هي",
];
els.btnFriend.onclick = ()=>{
  if(state.usedFriend || state.locked) return;
  state.usedFriend = true;
  els.btnFriend.disabled = true;
  els.audPanel.classList.remove('show');
  const q = state.questions[state.level];
  const tags = ['A','B','C','D'];
  const line = FRIEND_LINES[Math.floor(Math.random()*FRIEND_LINES.length)];
  const confident = Math.random() > 0.15;
  const answerIdx = confident ? q.a : [0,1,2,3].filter(i=>i!==q.a)[Math.floor(Math.random()*3)];
  els.friendText.innerHTML = `<b>صديقك:</b> "${line} <b>${tags[answerIdx]}: ${q.opts[answerIdx]}</b>"`;
  els.friendPanel.classList.add('show');
};

els.walkBtn.onclick = walkAway;
els.restartBtn.onclick = ()=> startGame(state.category);
</script>
